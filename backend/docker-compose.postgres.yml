version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ubereats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ubereats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./db/sql:/docker-entrypoint-initdb.d  # 注释掉自动初始化
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ubereats"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
